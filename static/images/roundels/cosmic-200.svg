<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="90" fill="none" stroke="#4B0082" stroke-width="6"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#8A2BE2" stroke-width="4"/>
  <!-- Central galaxy spiral -->
  <path d="M 100 100 Q 120 80 140 100 Q 120 120 100 100 Q 80 120 60 100 Q 80 80 100 100" fill="none" stroke="#FFD700" stroke-width="4"/>
  <!-- Planetary rings -->
  <ellipse cx="100" cy="100" rx="50" ry="16" fill="none" stroke="#87CEEB" stroke-width="2"/>
  <ellipse cx="100" cy="100" rx="16" ry="50" fill="none" stroke="#87CEEB" stroke-width="2"/>
  <!-- Stars scattered -->
  <circle cx="50" cy="50" r="2" fill="#FFFFFF"/>
  <circle cx="150" cy="50" r="3" fill="#FFFFFF"/>
  <circle cx="50" cy="150" r="2" fill="#FFFFFF"/>
  <circle cx="150" cy="150" r="3" fill="#FFFFFF"/>
  <circle cx="70" cy="120" r="2" fill="#FFFFFF"/>
  <circle cx="130" cy="80" r="2" fill="#FFFFFF"/>
  <!-- Nebula clouds -->
  <path d="M 60 80 Q 70 70 80 80 Q 70 90 60 80" fill="none" stroke="#FF69B4" stroke-width="2"/>
  <path d="M 120 120 Q 130 110 140 120 Q 130 130 120 120" fill="none" stroke="#FF69B4" stroke-width="2"/>
</svg>