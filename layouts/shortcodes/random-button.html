<p class="random-button-wrap">
	<button class="random-button" onclick="(function(){var sel='{{ if .IsNamedParams }}{{ .Get "selector" | default "section a" }}{{ else }}{{ .Get 0 | default "section a" }}{{ end }}';var links=document.querySelectorAll(sel);if(!links.length){links=document.querySelectorAll('#main section a[href]');}if(links.length){window.open(links[~~(Math.random()*links.length)].href,'_blank');}})();">{{ if .IsNamedParams }}{{ .Get "label" | default "Give me a story" }}{{ else }}{{ .Get 1 | default "Give me a story" }}{{ end }}</button>
</p>
